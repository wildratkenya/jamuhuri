kind = "web"
previewPath = "/"
title = "Jamuhuri Gachoroba - Author & Podcast"
version = "1.0.0"
id = "artifacts/jamuhuri-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22873

[services.development]
run = "pnpm --filter @workspace/jamuhuri-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jamuhuri-website", "run", "build" ]
publicDir = "artifacts/jamuhuri-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22873"
BASE_PATH = "/"
